<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#000000"/>
  <g fill="#ffffff" stroke="#ffffff" stroke-linecap="round">
    <!-- Orbital path -->
    <ellipse
      cx="400"
      cy="300"
      rx="210"
      ry="62"
      fill="none"
      stroke-width="22"
      transform="rotate(-24 400 300)"
    />
    <!-- Planet -->
    <circle cx="400" cy="300" r="108"/>
    <!-- Moon -->
    <circle cx="562" cy="248" r="22"/>
    <!-- Distant star -->
    <circle cx="218" cy="196" r="8"/>
  </g>
</svg>
